<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats - 8b8t</title>
    <link rel="stylesheet" href="assets/font_awesome.css">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .stats-page-main {
            background: radial-gradient(circle at 50% 0%, rgba(41,151,255,0.1) 0%, rgba(0,0,0,0) 60%), #000;
            padding-top: 75px;
            position: relative;
            min-height: unset !important;
        }
        .stats-hero {
            padding: 48px 0 36px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .stats-hero-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
            flex-wrap: wrap;
        }
        .stats-page-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 4px;
            letter-spacing: -0.02em;
        }
        .stats-page-sub {
            font-size: 15px;
            color: #6e6e73;
            margin: 0;
        }
        .stats-search-form {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 8px 8px 8px 18px;
            flex-shrink: 0;
            width: 380px;
            max-width: 100%;
            transition: border-color 0.2s;
        }
        .stats-search-form:focus-within {
            border-color: rgba(41,151,255,0.5);
            background: rgba(255,255,255,0.06);
        }
        .stats-search-form i { color: #6e6e73; font-size: 14px; flex-shrink: 0; }
        .stats-search-form input {
            flex: 1; background: transparent; border: none; outline: none;
            color: #fff; font-size: 15px; font-family: inherit; min-width: 0;
        }
        .stats-search-form input::placeholder { color: #6e6e73; }
        .stats-search-form button {
            background: #2997ff; border: none; border-radius: 10px; color: #fff;
            font-size: 14px; font-weight: 600; font-family: inherit;
            padding: 10px 18px; cursor: pointer; transition: background 0.2s, transform 0.15s;
            white-space: nowrap; flex-shrink: 0;
        }
        .stats-search-form button:hover { background: #0a84ff; transform: scale(1.03); }

        .stats-body { padding: 40px 0 80px; }

        .stats-section-label {
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: #6e6e73; margin: 0 0 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .lb-table {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 18px; overflow: hidden; max-width: 860px;
        }
        .lb-row {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer; transition: background 0.18s;
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-row:hover { background: rgba(41,151,255,0.07); }
        .lb-num { font-size: 13px; font-weight: 800; color: #2997ff; min-width: 32px; }
        .lb-avatar { width: 36px; height: 36px; border-radius: 7px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
        .lb-pname { flex: 1; font-size: 15px; font-weight: 600; color: #f5f5f7; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-meta { font-size: 13px; color: #6e6e73; white-space: nowrap; }
        .lb-kills-badge {
            font-size: 13px; font-weight: 700; color: #ff9f0a;
            background: rgba(255,159,10,0.1); border: 1px solid rgba(255,159,10,0.2);
            border-radius: 8px; padding: 4px 10px; white-space: nowrap; flex-shrink: 0;
        }
        .lb-skeleton {
            height: 64px; border-bottom: 1px solid rgba(255,255,255,0.04);
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%; animation: shimmer 1.4s infinite;
        }
        .lb-skeleton:last-child { border-bottom: none; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .lb-unavailable {
            padding: 60px 24px; text-align: center; color: #6e6e73;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .lb-unavailable i { font-size: 28px; opacity: 0.4; }
        .lb-unavailable p { font-size: 14px; margin: 0; }

        .stats-back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #86868b; padding: 10px 18px; border-radius: 10px;
            font-size: 14px; font-weight: 500; font-family: inherit;
            cursor: pointer; transition: all 0.2s; margin-bottom: 28px;
        }
        .stats-back-btn:hover { background: rgba(255,255,255,0.09); color: #fff; border-color: rgba(255,255,255,0.18); }

        .player-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 22px; padding: 36px; max-width: 1000px;
        }
        .player-card-header {
            display: flex; align-items: center; gap: 22px;
            margin-bottom: 32px; padding-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .player-card-avatar { width: 72px; height: 72px; border-radius: 14px; overflow: hidden; background: rgba(255,255,255,0.08); flex-shrink: 0; }
        .player-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .player-card-info h2 { font-size: 26px; font-weight: 700; color: #fff; margin: 0 0 6px; }
        .player-card-info code { display: block; font-size: 12px; color: #6e6e73; font-family: monospace; margin-bottom: 8px; word-break: break-all; }
        .player-join-date { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #86868b; }
        .player-join-date i { color: #2997ff; }

        .player-stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .pstat {
            display: flex; align-items: center; gap: 14px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 16px 18px; transition: background 0.2s, transform 0.2s;
        }
        .pstat:hover { background: rgba(255,255,255,0.04); transform: translateY(-1px); }
        .pstat-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
        .pstat.deaths .pstat-icon  { background: rgba(255,69,58,.12);   color: #ff453a; }
        .pstat.kills .pstat-icon   { background: rgba(255,159,10,.12);  color: #ff9f0a; }
        .pstat.mobs .pstat-icon    { background: rgba(162,132,94,.12);  color: #a2845e; }
        .pstat.time .pstat-icon    { background: rgba(41,151,255,.12);  color: #2997ff; }
        .pstat.blocks .pstat-icon  { background: rgba(191,90,242,.12);  color: #bf5af2; }
        .pstat.tnt .pstat-icon     { background: rgba(255,92,55,.12);   color: #ff5c37; }
        .pstat.obsidian .pstat-icon{ background: rgba(88,101,242,.12);  color: #5865f2; }
        .pstat.netherite .pstat-icon{ background: rgba(255,0,85,.12);   color: #ff0055; }
        .pstat.elytra .pstat-icon  { background: rgba(48,209,88,.12);   color: #30d158; }
        .pstat.totems .pstat-icon  { background: rgba(255,215,0,.12);   color: #ffd700; }
        .pstat.arrows .pstat-icon  { background: rgba(255,255,255,.08); color: #fff; }
        .pstat-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .pstat-val { font-size: 20px; font-weight: 700; color: #fff; line-height: 1; }
        .pstat-label { font-size: 12px; color: #86868b; white-space: nowrap; }

        .stats-state-box {
            max-width: 440px; margin: 0 auto; text-align: center; padding: 64px 40px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 22px;
        }
        .stats-state-box p { font-size: 15px; color: #86868b; margin: 0; }
        .stats-state-box.error .stats-state-icon {
            width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 50%;
            background: rgba(255,69,58,.1); display: flex; align-items: center;
            justify-content: center; font-size: 26px; color: #ff453a;
        }
        .stats-state-box.error h3 { font-size: 20px; font-weight: 700; color: #fff; margin: 0 0 10px; }
        .stats-spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #2997ff; border-radius: 50%; margin: 0 auto 20px;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .stats-hero-row { flex-direction: column; align-items: flex-start; }
            .stats-search-form { width: 100%; }
            .player-stats-grid { grid-template-columns: repeat(2, 1fr); }
            .player-card { padding: 20px; }
            .player-card-header { flex-direction: column; align-items: flex-start; }
            .lb-meta { display: none; }
        }
    </style>
</head>
<body>
<div id="header-placeholder"></div>

<main class="stats-page-main">

    <!-- inline search -->
    <section class="stats-hero outer">
        <div class="inner">
            <div class="stats-hero-row">
                <div class="stats-hero-text">
                    <h1 class="stats-page-title">Player Stats</h1>
                    <p class="stats-page-sub">Look up any player on 8b8t</p>
                </div>
                <form class="stats-search-form" id="search-form">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="player-search" placeholder="Enter a username..." autocomplete="off">
                    <button type="submit">Search</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Leaderboard — default view -->
    <section class="stats-body outer" id="leaderboard-section">
        <div class="inner">
            <p class="stats-section-label"><i class="fa-solid fa-khanda"></i> Top Killers</p>
            <div class="lb-table" id="leaderboard-list">
                <div class="lb-skeleton"></div>
                <div class="lb-skeleton"></div>
                <div class="lb-skeleton"></div>
                <div class="lb-skeleton"></div>
                <div class="lb-skeleton"></div>
            </div>
        </div>
    </section>

    <!-- Player result view -->
    <section class="stats-body outer" id="player-result" style="display:none;">
        <div class="inner">
            <button class="stats-back-btn" onclick="showLeaderboard()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>

            <div class="player-card">
                <div class="player-card-header">
                    <div class="player-card-avatar">
                        <img id="player-skin" src="" alt="Skin">
                    </div>
                    <div class="player-card-info">
                        <h2 id="player-name"></h2>
                        <code id="player-uuid"></code>
                        <span class="player-join-date">
                                <i class="fa-solid fa-calendar-days"></i>
                                <span id="join-date"></span>
                            </span>
                    </div>
                </div>

                <div class="player-stats-grid">
                    <div class="pstat deaths">
                        <div class="pstat-icon"><i class="fa-solid fa-skull"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-deaths">—</span>
                            <span class="pstat-label">Deaths</span>
                        </div>
                    </div>
                    <div class="pstat kills">
                        <div class="pstat-icon"><i class="fa-solid fa-khanda"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-kills">—</span>
                            <span class="pstat-label">Kills</span>
                        </div>
                    </div>
                    <div class="pstat mobs">
                        <div class="pstat-icon"><i class="fa-solid fa-ghost"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-mobs">—</span>
                            <span class="pstat-label">Mobs Killed</span>
                        </div>
                    </div>
                    <div class="pstat time">
                        <div class="pstat-icon"><i class="fa-solid fa-clock"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-time">—</span>
                            <span class="pstat-label">Time Played</span>
                        </div>
                    </div>
                    <div class="pstat blocks">
                        <div class="pstat-icon"><i class="fa-solid fa-hammer"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-blocks-broken">—</span>
                            <span class="pstat-label">Blocks Broken</span>
                        </div>
                    </div>
                    <div class="pstat blocks">
                        <div class="pstat-icon"><i class="fa-solid fa-cube"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-blocks-placed">—</span>
                            <span class="pstat-label">Blocks Placed</span>
                        </div>
                    </div>
                    <div class="pstat tnt">
                        <div class="pstat-icon"><i class="fa-solid fa-bomb"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-tnt">—</span>
                            <span class="pstat-label">TNT Used</span>
                        </div>
                    </div>
                    <div class="pstat obsidian">
                        <div class="pstat-icon"><i class="fa-solid fa-gem"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-obsidian-mined">—</span>
                            <span class="pstat-label">Obsidian</span>
                        </div>
                    </div>
                    <div class="pstat netherite">
                        <div class="pstat-icon"><i class="fa-solid fa-dragon"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-netherite">—</span>
                            <span class="pstat-label">Netherite</span>
                        </div>
                    </div>
                    <div class="pstat elytra">
                        <div class="pstat-icon"><i class="fa-solid fa-paper-plane"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-elytra">—</span>
                            <span class="pstat-label">Elytra Used</span>
                        </div>
                    </div>
                    <div class="pstat totems">
                        <div class="pstat-icon"><i class="fa-solid fa-heart"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-totems">—</span>
                            <span class="pstat-label">Totems Used</span>
                        </div>
                    </div>
                    <div class="pstat arrows">
                        <div class="pstat-icon"><i class="fa-solid fa-crosshairs"></i></div>
                        <div class="pstat-body">
                            <span class="pstat-val" id="stat-arrows">—</span>
                            <span class="pstat-label">Arrows Shot</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Loading section -->
    <section class="stats-body outer" id="loading-section" style="display:none;">
        <div class="inner">
            <div class="stats-state-box">
                <div class="stats-spinner"></div>
                <p>Loading player data...</p>
            </div>
        </div>
    </section>

    <!-- Error section -->
    <section class="stats-body outer" id="error-section" style="display:none;">
        <div class="inner">
            <div class="stats-state-box error">
                <div class="stats-state-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <h3 id="error-title">Error</h3>
                <p id="error-message">Something went wrong.</p>
                <button class="stats-back-btn" onclick="showLeaderboard()" style="margin-top:20px;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Leaderboard
                </button>
            </div>
        </div>
    </section>

</main>

<div id="footer-placeholder"></div>

<script src="assets/components.js"></script>
<script>
    const API_URL = 'http://192.168.2.10:5300';

    document.addEventListener('DOMContentLoaded', () => {
        loadLeaderboard();
    });

    document.getElementById('search-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('player-search').value.trim();
        if (!name) return;
        showLoading();
        try {
            const res = await fetch(`${API_URL}/player/${encodeURIComponent(name)}`);
            const data = await res.json();
            if (data.success && data.data) {
                showPlayer(data.data);
            } else {
                showError('Player Not Found', 'This player has no recorded stats or has never joined 8b8t.');
            }
        } catch (err) {
            showError('Connection Error', 'Unable to reach the stats server. Try again in a moment.');
        }
    });

    async function loadLeaderboard() {
        try {
            const res = await fetch(`${API_URL}/leaderboard?sort=kills&limit=10`);
            const data = await res.json();
            if (data.success && data.data) {
                renderLeaderboard(data.data);
            } else {
                showLeaderboardUnavailable();
            }
        } catch (err) {
            showLeaderboardUnavailable();
        }
    }

    function renderLeaderboard(players) {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = players.map((p, i) => `
                <div class="lb-row" onclick="searchPlayer('${p.name}')">
                    <span class="lb-num">#${i + 1}</span>
                    <img class="lb-avatar" src="${p.skin_url}" alt="${p.name}" onerror="this.src='assets/img/default-skin.png'">
                    <span class="lb-pname">${p.name}</span>
                    <span class="lb-meta">${formatTime(p.time_played)} played</span>
                    <span class="lb-kills-badge">${formatNumber(p.kills)} kills</span>
                </div>
            `).join('');
    }

    function showLeaderboardUnavailable() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = `
                <div class="lb-unavailable">
                    <i class="fa-solid fa-wrench"></i>
                    <p>Leaderboard data is temporarily unavailable.</p>
                </div>
            `;
    }

    function searchPlayer(name) {
        document.getElementById('player-search').value = name;
        document.getElementById('search-form').dispatchEvent(new Event('submit'));
    }

    function showLeaderboard() {
        document.getElementById('leaderboard-section').style.display = 'block';
        document.getElementById('player-result').style.display = 'none';
        document.getElementById('error-section').style.display = 'none';
        document.getElementById('loading-section').style.display = 'none';
    }

    function showPlayer(p) {
        document.getElementById('leaderboard-section').style.display = 'none';
        document.getElementById('error-section').style.display = 'none';
        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('player-result').style.display = 'block';

        document.getElementById('player-skin').src = p.skin_url || 'assets/img/default-skin.png';
        document.getElementById('player-name').textContent = p.name;
        document.getElementById('player-uuid').textContent = p.uuid;
        document.getElementById('join-date').textContent = formatDate(p.join_date);

        document.getElementById('stat-deaths').textContent = formatNumber(p.deaths);
        document.getElementById('stat-kills').textContent = formatNumber(p.kills);
        document.getElementById('stat-mobs').textContent = formatNumber(p.mobs_killed);
        document.getElementById('stat-time').textContent = formatTime(p.time_played);
        document.getElementById('stat-blocks-broken').textContent = formatNumber(p.blocks_broken);
        document.getElementById('stat-blocks-placed').textContent = formatNumber(p.blocks_placed);
        document.getElementById('stat-tnt').textContent = formatNumber(p.tnt_used);
        document.getElementById('stat-obsidian-mined').textContent = formatNumber(p.obsidian_mined);
        document.getElementById('stat-netherite').textContent = formatNumber(p.netherite_mined);
        document.getElementById('stat-elytra').textContent = formatNumber(p.elytra_used);
        document.getElementById('stat-totems').textContent = formatNumber(p.totems_used);
        document.getElementById('stat-arrows').textContent = formatNumber(p.arrows_shot);
    }

    function showLoading() {
        document.getElementById('leaderboard-section').style.display = 'none';
        document.getElementById('player-result').style.display = 'none';
        document.getElementById('error-section').style.display = 'none';
        document.getElementById('loading-section').style.display = 'block';
    }

    function showError(title, msg) {
        document.getElementById('leaderboard-section').style.display = 'none';
        document.getElementById('player-result').style.display = 'none';
        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('error-section').style.display = 'block';
        document.getElementById('error-title').textContent = title;
        document.getElementById('error-message').textContent = msg;
    }

    function formatNumber(n) {
        if (!n) return '0';
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return n.toString();
    }

    function formatTime(ticks) {
        if (!ticks) return '0m';
        const h = Math.floor(ticks / 72000);
        const m = Math.floor((ticks % 72000) / 1200);
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    function formatDate(ts) {
        if (!ts) return 'Unknown';
        return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }
</script>
</body>
</html>
